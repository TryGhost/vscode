name: Publish Open VSX

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Verify Open VSX token
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          test -n "$OVSX_PAT" || {
            echo "Missing OVSX_PAT secret."
            exit 1
          }
          npx --yes ovsx verify-pat TryGhost -p "$OVSX_PAT"

      - name: Publish extension to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish -p "$OVSX_PAT" --yarn --skip-duplicate
